<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo-medusa.png">
    <title>MEDUSA | Login Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }
        .login-card {
            background: var(--bg-sidebar);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card .logo {
            width: 120px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(6, 239, 107, 0.3));
        }
        .login-card h2 {
            font-family: 'Outfit';
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .error-msg {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="login-container">
        <div class="login-card">
            <img src="logo-medusa.png" alt="Medusa Logo" class="logo">
            <h2>ACESSO ADMIN</h2>
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label>E-mail</label>
                    <input type="email" id="email" required placeholder="admin@medusa.com">
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">ENTRAR</button>
                <p id="error-text" class="error-msg">Usuário ou senha incorretos!</p>
            </form>
            <a href="index.html" style="display: block; margin-top: 30px; color: var(--text-secondary); text-decoration: none; font-size: 0.8rem;">← Voltar ao Cardápio</a>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
